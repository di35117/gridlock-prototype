version: '3.8'

services:
  # -----------------------------------
  # PostgreSQL / PostGIS Database Service
  # -----------------------------------
  postgres:
    image: postgis/postgis:16-3.4
    container_name: btp_postgres
    restart: always
    environment:
      POSTGRES_USER: btp_user
      POSTGRES_PASSWORD: btp_pass
      POSTGRES_DB: btp_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # -----------------------------------
  # Redis Cache / Message Broker
  # -----------------------------------
  redis:
    image: redis:7-alpine
    container_name: btp_redis
    restart: always
    ports:
      - "6379:6379"

  # -----------------------------------
  # Python FastAPI Backend
  # -----------------------------------
  backend:
    build: 
      context: ./backend
    container_name: btp_fastapi
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://btp_user:btp_pass@postgres:5432/btp_intelligence
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - postgres
      - redis

  # -----------------------------------
  # React Frontend Dashboard (Vite)
  # -----------------------------------
  frontend:
    build:
      context: ./frontend
      # Pass the MapTiler token to the Vite build step
      args:
        VITE_MAPTILER_TOKEN: ${VITE_MAPTILER_TOKEN}
    container_name: btp_react_ui
    restart: always
    ports:
      - "3000:80"  
    depends_on:
      - backend

volumes:
  postgres_data: